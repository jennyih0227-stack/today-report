<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>今日報報 ｜ 入口</title>
<style>
  :root{--navy:#1B2A4A;--navy2:#2E4A7A;--gold:#C9A84C;--gold-d:#A07830;--cream:#FAF6EE;--card:#FCF3CF;--line:#E6D9A8}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:"PingFang TC","Microsoft JhengHei","Noto Sans CJK TC",sans-serif;background:var(--cream);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
  .card{width:100%;max-width:400px;background:#fff;border-radius:22px;overflow:hidden;box-shadow:0 10px 40px rgba(27,42,74,.18)}
  .hd{background:linear-gradient(135deg,var(--navy),var(--navy2));padding:26px 22px;text-align:center;border-bottom:5px solid var(--gold)}
  .hd .t{font-size:32px;font-weight:900;color:#fff;letter-spacing:2px}
  .hd .s{font-size:15px;color:var(--gold);font-weight:700;margin-top:6px}
  .body{padding:24px 22px 26px;text-align:center}
  .qrbox{background:#fff;border:2px solid var(--line);border-radius:16px;padding:14px;display:inline-block;margin-bottom:18px}
  .qrbox img{width:210px;height:210px;display:block}
  .qrcap{font-size:13px;color:#888;margin-bottom:20px}
  .open-btn{display:block;width:100%;background:var(--gold);color:var(--navy);text-decoration:none;font-size:20px;font-weight:900;padding:16px;border-radius:14px;margin-bottom:14px;transition:.15s}
  .open-btn:active{background:var(--gold-d);color:#fff}
  .line-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;background:#06C755;color:#fff;border:none;text-decoration:none;font-size:19px;font-weight:900;padding:15px;border-radius:14px;margin-bottom:14px;font-family:inherit;cursor:pointer;transition:.15s}
  .line-btn:active{background:#05a648}
  .line-btn .ico{width:24px;height:24px;flex:none}
  .url-row{background:var(--navy);border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:8px;margin-bottom:8px}
  .url-row a{flex:1;color:var(--gold);font-size:13px;text-decoration:none;word-break:break-all;text-align:left;font-weight:700}
  .copy-btn{flex:none;background:var(--gold);color:var(--navy);border:none;border-radius:8px;padding:8px 12px;font-family:inherit;font-weight:900;font-size:13px;cursor:pointer}
  .copy-btn:active{background:#fff}
  .hint{font-size:12px;color:#999;line-height:1.6;margin-top:12px}
  .ft{background:var(--navy);padding:12px;display:flex;align-items:center;justify-content:center;gap:8px;border-top:4px solid var(--gold)}
  .ft .seal{width:30px;height:30px;border-radius:50%;background:var(--navy);border:2px solid var(--gold);display:flex;align-items:center;justify-content:center}
  .ft .seal b{font-size:12px;color:var(--gold);letter-spacing:-1px}
  .ft span{font-size:14px;color:#fff;font-weight:700}
  .toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:10px 22px;border-radius:20px;font-size:14px;font-weight:700;opacity:0;transition:.3s;pointer-events:none}
  .toast.show{opacity:1}
</style>
</head>

<script>
const SHARE_URL='https://jennyih0227-stack.github.io/today-report/';
const SHARE_MSG='今日報報 每日財經匯整（匯率・黃金・台股）▶ '+SHARE_URL;
async function shareToLine(){
  // 手機原生分享選單（可選 LINE、其他 App）
  if(navigator.share){
    try{ await navigator.share({title:'今日報報',text:'今日報報 每日財經匯整',url:SHARE_URL}); return; }
    catch(e){ if(e&&e.name==='AbortError') return; }
  }
  // 退回：直接開 LINE 分享
  window.open('https://line.me/R/msg/text/?'+encodeURIComponent(SHARE_MSG),'_blank');
}
function copyUrl(){
  const url='https://jennyih0227-stack.github.io/today-report/';
  const done=()=>{const t=document.getElementById('toast');t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1600);};
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(url).then(done).catch(()=>fallback(url,done));
  }else fallback(url,done);
}
function fallback(url,done){
  const ta=document.createElement('textarea');ta.value=url;ta.style.position='fixed';ta.style.opacity='0';
  document.body.appendChild(ta);ta.select();try{document.execCommand('copy');done();}catch(e){}ta.remove();
}
</script>
