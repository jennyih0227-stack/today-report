  :root{--navy:#1B2A4A;--gold:#C9A84C;--card:#FCF3CF;--line:#E6D9A8;--red:#C0392B;--green:#1E8449}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    font-family:'NotoTC-Bold',"PingFang TC","Microsoft JhengHei","Heiti TC",sans-serif;background:#aebfd4;
    display:flex;flex-direction:column;align-items:center;padding:6px 8px;overflow:hidden;
  }
  .bar{width:100%;max-width:420px;display:flex;gap:6px;margin-bottom:5px}
  .btn{flex:1;border:none;border-radius:9px;padding:9px 4px;font-family:inherit;font-weight:900;font-size:14px;cursor:pointer}
  .btn-n{background:var(--navy);color:#fff}
  .btn-g{background:var(--gold);color:var(--navy)}
  .btn-e{background:#fff;color:var(--navy);flex:0 0 44px;font-size:16px}
  .btn-line{background:#06C755;color:#fff}
  .btn:disabled{opacity:.5}
  .st{width:100%;max-width:420px;font-size:11px;color:#3a4252;min-height:14px;margin-bottom:4px;text-align:center;font-weight:700}
  .st.err{color:#7a1f17}.st.ok{color:#155c34}
  /* 小語列：選單 + 自訂輸入 */
  .ql{width:100%;max-width:420px;display:flex;gap:6px;margin-bottom:5px}
  .ql select{flex:1;border:1px solid #ccc;border-radius:9px;padding:8px 6px;font-family:inherit;font-size:13px;background:#fff;color:var(--navy);font-weight:700}
  .ql input{flex:1.2;border:1px solid #ccc;border-radius:9px;padding:8px 8px;font-family:inherit;font-size:13px}
  .edit{width:100%;max-width:420px;display:none;background:#fff;border-radius:10px;padding:8px;margin-bottom:5px}
  .edit.open{display:block}
  .eg{display:grid;grid-template-columns:1fr 1fr;gap:5px}
  .eg label{font-size:10px;color:#666;display:flex;flex-direction:column;gap:1px}
  .eg input{border:1px solid #ddd;border-radius:5px;padding:4px 6px;font-family:inherit;font-size:13px}
  .eg .apply{grid-column:1/3;background:var(--navy);color:#fff;border:none;border-radius:7px;padding:7px;font-weight:900;font-family:inherit;margin-top:2px}
  #cap{width:100%;max-width:420px;background:#aebfd4;padding:4px}
  .card{background:var(--card);border-radius:20px;padding:clamp(12px,3.2vw,20px) clamp(14px,4vw,22px)}
  .top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:3px}
  .top .lt{display:flex;flex-direction:column;align-items:flex-start;gap:2px;flex:none}
  .top .t{font-family:'NotoTC-Black','PingFang TC',sans-serif;font-size:clamp(22px,6vw,30px);font-weight:900;color:var(--navy);letter-spacing:2px;line-height:1.05}
  .top .d{font-size:clamp(14px,3.8vw,19px);font-weight:900;color:var(--navy);letter-spacing:.5px}
  .top .q{flex:1;font-size:clamp(13px,3.8vw,19px);font-weight:900;color:#FFFFFF;text-align:right;line-height:1.5;display:none;text-decoration:none!important;align-self:center;word-break:break-word;
    background:#1B2A4A;padding:9px 16px;border-radius:14px;box-shadow:0 2px 6px rgba(0,0,0,.12);letter-spacing:.5px;
    -webkit-box-orient:vertical;overflow:hidden}
  .top .q.show{display:-webkit-box;-webkit-line-clamp:2}
  .dv{height:2px;background:var(--line);margin:4px 0}
  .r{display:flex;align-items:center;padding:clamp(5px,1.4vh,9px) 0;border-bottom:1px solid var(--line)}
  .r:last-of-type{border-bottom:none}
  .r .ic{width:clamp(34px,9vw,46px);flex:none;text-align:center;font-size:clamp(20px,5.6vw,28px)}
  .r .l{font-family:'NotoTC-Black','PingFang TC',sans-serif;font-size:clamp(17px,5vw,25px);font-weight:900;color:var(--navy);margin-left:9px}
  .r .v{margin-left:auto;font-size:clamp(21px,6.2vw,31px);font-weight:900;color:var(--red);font-variant-numeric:tabular-nums}
  .gb{width:clamp(36px,9.5vw,46px);height:clamp(28px,7.4vw,36px);border-radius:5px;background:linear-gradient(135deg,#e8c977,#caa64a);display:flex;flex-direction:column;align-items:center;justify-content:center;line-height:1.05;padding:2px 0}
  .gb b{font-size:clamp(8px,2.3vw,11px);font-weight:900;color:#5c4a17;letter-spacing:.5px}.gb i{font-size:clamp(6px,1.7vw,8px);color:#5c4a17;font-style:normal;font-weight:700}
  .ft{display:flex;align-items:center;gap:7px;margin-top:7px}
  .ft .s{width:clamp(26px,7vw,32px);height:clamp(26px,7vw,32px);border-radius:50%;background:var(--navy);border:2px solid var(--gold);display:flex;align-items:center;justify-content:center;flex:none}
  .ft .s b{font-size:clamp(10px,2.8vw,12px);color:var(--gold);letter-spacing:-1px}
  .ft .n{font-size:clamp(10px,2.8vw,13px);font-weight:700;color:#555}
  .tm{text-align:right;font-size:clamp(10px,2.8vw,13px);color:#5a6275;margin:5px 10px 0;font-weight:700}
  /* LINE/FB 內建瀏覽器提示橫幅 */
  .ib-banner{width:100%;max-width:420px;background:#FFF3CD;border:1px solid #E6C34A;border-radius:10px;padding:9px 12px;margin-bottom:6px;font-size:12px;color:#7a5a00;font-weight:700;line-height:1.5;display:none}
  .ib-banner.show{display:block}
  .ib-banner b{color:#B36B00}
  /* 長按存圖預覽層 */
  .saveLayer{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:60;display:none;flex-direction:column;align-items:center;justify-content:center;padding:18px}
  .saveLayer.open{display:flex}
  .saveLayer .tipbar{color:#fff;font-size:15px;font-weight:800;text-align:center;margin-bottom:12px;line-height:1.6}
  .saveLayer .tipbar span{color:#FFD86B}
  .saveLayer img{max-width:100%;max-height:74vh;border-radius:12px;box-shadow:0 8px 30px rgba(0,0,0,.5)}

<body>

<div class="bar">
  <button class="btn btn-n" id="rf" onclick="loadAll()">&#128260; 更新</button>
  <button class="btn btn-g" id="dl" onclick="dlPng()">&#11015;&#65039; 下載</button>
  <button class="btn btn-line" id="sh" onclick="shareLine()">LINE 分享</button>
  <button class="btn btn-e" onclick="document.getElementById('ed').classList.toggle('open')">&#9999;&#65039;</button>
</div>

<div class="ql">
  <select id="qsel" onchange="onQuoteSelect()">
    <option value="">— 選每日小語 —</option>
  </select>
  <input id="qcustom" placeholder="或自己輸入小語…" oninput="onQuoteInput()">
</div>

<div class="st" id="st">載入中…</div>

<div class="ib-banner" id="ibBanner">
  📱 你正在 <b>LINE 內建瀏覽器</b>，下載鈕可能無效。建議點右上角 <b>「⋯」→ 用預設瀏覽器開啟</b>；或直接按下載，會跳出圖片讓你<b>長按儲存</b>。
</div>

<div class="edit" id="ed">
  <div class="eg">
    <label>美金<input id="e_usd" data-k="usd"></label>
    <label>日元<input id="e_jpy" data-k="jpy"></label>
    <label>歐元<input id="e_eur" data-k="eur"></label>
    <label>澳幣<input id="e_aud" data-k="aud"></label>
    <label>人民幣<input id="e_cny" data-k="cny"></label>
    <label>黃金價<input id="e_gold" data-k="gold"></label>
    <label>台股<input id="e_twii" data-k="twii"></label>
    <label>日期<input id="e_date" data-k="date" placeholder="2026 06 26"></label>
    <button class="apply" onclick="applyEdits()">套用</button>
  </div>
</div>

<div id="cap">
  <div class="card">
    <div class="top">
      <div class="lt">
        <div class="t">今日報報</div>
        <div class="d" id="d_date">2026 06 26</div>
      </div>
      <div class="q" id="d_quote"></div>
    </div>
    <div class="dv"></div>
    <div class="r"><div class="ic">&#127482;&#127480;</div><div class="l">美金</div><div class="v" id="v_usd">--</div></div>
    <div class="r"><div class="ic">&#127471;&#127477;</div><div class="l">日元</div><div class="v" id="v_jpy">--</div></div>
    <div class="r"><div class="ic">&#127466;&#127482;</div><div class="l">歐元</div><div class="v" id="v_eur">--</div></div>
    <div class="r"><div class="ic">&#127462;&#127482;</div><div class="l">澳幣</div><div class="v" id="v_aud">--</div></div>
    <div class="r"><div class="ic">&#127464;&#127475;</div><div class="l">人民幣</div><div class="v" id="v_cny">--</div></div>
    <div class="r"><div class="ic"><span class="gb"><b>GOLD</b><i>999&#9733;&#9733;&#9733;</i></span></div><div class="l">黃金價</div><div class="v" id="v_gold">--</div></div>
    <div class="r"><div class="ic">&#128200;</div><div class="l">台股指數</div><div class="v" id="v_twii">--</div></div>
    <div class="ft"><div class="s"><b>躍勇</b></div><div class="n" id="d_note">淨值彙整以工作日早上 9:00 為參考</div></div>
  </div>
  <div class="tm" id="d_time">上午 8:00</div>
</div>

<div class="saveLayer" id="saveLayer">
  <div class="tipbar"><span>長按下方圖片</span> → 選「儲存影像 / 加入照片」</div>
  <img id="saveImg" src="" alt="今日報報">
  <button class="closeBtn" onclick="document.getElementById('saveLayer').classList.remove('open')">關閉</button>
</div>

<script>
const QUOTES=["☀️ 早安！新的一天，從掌握財經脈動開始", "☔️ 下雨天出門記得帶傘喔，路上小心慢行", "🌤️ 今天天氣多變，記得帶件外套", "❄️ 天氣轉涼，注意保暖別感冒了", "🔥 高溫炎熱，多補充水分顧好身體", "💪 美好的一週開始，元氣滿滿衝刺業績", "🌙 週五加油！撐過今天就是週末囉", "💰 理財第一步：先看懂今天的匯率與金價", "📈 投資路上，紀律比運氣更重要", "🪙 黃金是資產的避風港，分散配置更安心", "💵 美元保單規劃，趁匯率波動掌握時機", "🏦 財富傳承，從今天的規劃開始", "🤝 真誠服務，是最好的成交之道", "📞 今天，主動關心三位老客戶吧", "✨ 每一次拜訪，都是累積信任的機會", "🎯 設定今日目標，一步一步達成它", "🌱 持續學習，是業務最好的投資", "☕️ 先喝杯咖啡，再優雅地開始一天", "😊 微笑面對客戶，正能量會傳染", "🚀 機會留給準備好的人，今天也要全力以赴", "🧧 守護家庭財富，是我們的使命", "📊 數據會說話，讓專業帶來信任", "💎 你的價值，來自每天的累積", "🌈 風雨過後總有彩虹，堅持就會看見", "🍀 願今天為你帶來好運與好業績", "⏰ 把握黃金時段，早起的鳥兒有蟲吃", "📝 今日事今日畢，列出三件最重要的事", "🛡️ 保險，是給家人最溫柔的承諾", "🌟 你今天的努力，是未來的底氣", "❤️ 照顧好自己，才能照顧好客戶"];
const state={usd:'',jpy:'',eur:'',aud:'',cny:'',gold:'',twii:'',date:'',time:'',quote:''};
const ss=(m,c='')=>{const s=document.getElementById('st');s.textContent=m;s.className='st '+c};
const nf=(v,d)=>Number(v).toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d});
function today(){const n=new Date(),y=n.getFullYear(),m=String(n.getMonth()+1).padStart(2,'0'),d=String(n.getDate()).padStart(2,'0');let h=n.getHours();const mm=String(n.getMinutes()).padStart(2,'0'),ap=h<12?'上午':'下午';let hh=h%12||12;return{date:y+' '+m+' '+d,time:ap+' '+hh+':'+mm}}

// 小語下拉初始化
(function(){const sel=document.getElementById('qsel');QUOTES.forEach((q,i)=>{const o=document.createElement('option');o.value=q;o.textContent=q;sel.appendChild(o)})})();
function setQuote(txt){state.quote=txt;const el=document.getElementById('d_quote');el.textContent=txt;el.classList.toggle('show',!!txt.trim())}
function onQuoteSelect(){const v=document.getElementById('qsel').value;if(v){document.getElementById('qcustom').value='';setQuote(v)}else if(!document.getElementById('qcustom').value)setQuote('')}
function onQuoteInput(){const v=document.getElementById('qcustom').value;if(v){document.getElementById('qsel').value='';setQuote(v)}else setQuote('')}

async function rates(){const r=await fetch('https://open.er-api.com/v6/latest/TWD');const j=await r.json();if(j.result!=='success')throw 0;const t=j.rates;return{usd:1/t.USD,jpy:1/t.JPY,eur:1/t.EUR,aud:1/t.AUD,cny:1/t.CNY,u:1/t.USD}}
async function gold(u){try{const r=await fetch('https://api.gold-api.com/price/XAU');const j=await r.json();return j.price/31.1035*37.5*u}catch(e){return null}}
async function twii(){try{const r=await fetch('data/twii.json?_t='+Date.now());const j=await r.json();if(j&&j.twii!=null)return Number(j.twii)}catch(e){}try{const ym=new Date().toISOString().slice(0,10).replace(/-/g,'');const r=await fetch('https://www.twse.com.tw/indicesReport/MI_5MINS_HIST?response=json&date='+ym);const j=await r.json();if(j.data&&j.data.length)return Number(String(j.data[j.data.length-1][4]).replace(/,/g,''))}catch(e){}return null}

async function loadAll(){
  const b=document.getElementById('rf');b.disabled=true;ss('讀取中…');
  const t=today();state.date=t.date;state.time=t.time;let f=[];
  try{const r=await rates();state.usd=nf(r.usd,3);state.jpy=nf(r.jpy,4);state.eur=nf(r.eur,3);state.aud=nf(r.aud,3);state.cny=nf(r.cny,3);const g=await gold(r.u);g?state.gold=nf(g,1):f.push('黃金')}catch(e){f.push('匯率')}
  try{const x=await twii();x?state.twii=x.toLocaleString('en-US'):f.push('台股')}catch(e){f.push('台股')}
  render();b.disabled=false;
  f.length?ss('⚠️ '+f.join('、')+' 抓取失敗，請按鉛筆手動填','err'):ss('✅ 已更新 '+state.time,'ok');
}
function render(){
  for(const k of['usd','jpy','eur','aud','cny','gold','twii'])if(state[k]!=='')document.getElementById('v_'+k).textContent=state[k];
  document.getElementById('d_date').textContent=state.date;
  document.getElementById('d_time').textContent=state.time;
  // 底部說明的時間改為讀取時間
  document.getElementById('d_note').textContent='淨值彙整以工作日 '+state.time+' 為參考';
  for(const i of document.querySelectorAll('.eg input')){const k=i.dataset.k;if(state[k]!=='')i.value=state[k]}
}
function applyEdits(){for(const i of document.querySelectorAll('.eg input')){const k=i.dataset.k,v=i.value.trim();if(!v)continue;state[k]=v;k==='date'?document.getElementById('d_date').textContent=v:document.getElementById('v_'+k).textContent=v}ss('已套用','ok');document.getElementById('ed').classList.remove('open')}
/* 偵測 LINE / FB / IG 等內建瀏覽器 */
function isInApp(){
  const ua=navigator.userAgent||'';
  return /Line|FBAN|FBAV|FB_IAB|Instagram|MicroMessenger/i.test(ua);
}
async function dlPng(){
  const b=document.getElementById('dl');b.disabled=true;ss('產生圖片中…');
  try{
    const c=await html2canvas(document.getElementById('cap'),{scale:3,backgroundColor:'#aebfd4'});
    const url=c.toDataURL('image/png');
    if(isInApp()){
      // LINE/FB 內建瀏覽器：跳出圖片讓使用者長按儲存
      document.getElementById('saveImg').src=url;
      document.getElementById('saveLayer').classList.add('open');
      ss('請長按圖片選「儲存影像」','ok');
    }else{
      const a=document.createElement('a');
      a.download='今日報報_'+(state.date||'今日').replace(/ /g,'')+'.png';
      a.href=url;document.body.appendChild(a);a.click();a.remove();
      ss('✅ 已下載；若無反應請長按圖卡存圖','ok');
    }
  }catch(e){ss('下載失敗，請改用長按圖卡存圖','err');}
  b.disabled=false;
}

/* 分享到 LINE：優先分享圖卡圖片（手機原生選單），否則分享工具網址 */
const TOOL_URL='https://jennyih0227-stack.github.io/today-report/';
async function shareLine(){
  const b=document.getElementById('sh');b.disabled=true;ss('準備分享…');
  try{
    const canvas=await html2canvas(document.getElementById('cap'),{scale:3,backgroundColor:'#aebfd4'});
    // 嘗試用 Web Share API 分享「圖片檔」（可選 LINE）
    const blob=await new Promise(res=>canvas.toBlob(res,'image/png'));
    const file=new File([blob],'今日報報_'+(state.date||'今日').replace(/ /g,'')+'.png',{type:'image/png'});
    if(navigator.canShare&&navigator.canShare({files:[file]})){
      await navigator.share({files:[file],title:'今日報報',text:state.quote||'今日報報 每日財經匯整'});
      ss('✅ 已開啟分享選單','ok');b.disabled=false;return;
    }
    // 退回：分享工具網址到 LINE
    shareUrlToLine();
    ss('已開啟 LINE 分享網址','ok');
  }catch(e){
    // 使用者取消分享不算錯誤
    if(e&&e.name==='AbortError'){ss('已取消分享');}
    else{ shareUrlToLine(); ss('已開啟 LINE 分享網址','ok'); }
  }
  b.disabled=false;
}
function shareUrlToLine(){
  const msg=encodeURIComponent((state.quote?state.quote+'\n':'')+'今日報報 每日財經匯整 ▶ '+TOOL_URL);
  window.open('https://line.me/R/msg/text/?'+msg,'_blank');
}
window.addEventListener('load',()=>{const t=today();document.getElementById('d_date').textContent=t.date;document.getElementById('d_time').textContent=t.time;document.getElementById('d_note').textContent='淨值彙整以工作日 '+t.time+' 為參考';if(isInApp())document.getElementById('ibBanner').classList.add('show');loadAll()});
</script>
</body>
</html>
